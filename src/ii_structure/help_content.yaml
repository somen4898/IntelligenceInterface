overview: |
  ii-structure gives you structural code navigation for Python, Go, and TypeScript projects.
  Instead of grepping text and reading whole files, ask structural questions
  and get compact YAML answers. All commands work identically across languages.

  SUPPORTED LANGUAGES: Python (.py), Go (.go), TypeScript (.ts, .tsx)

  WHY USE THIS: outline + locate + body costs ~200 tokens to understand a symbol.
  Reading the file costs ~2000 tokens. usages gives you type-resolved references
  that grep cannot — it distinguishes User.save() from Product.save().

  FIRST RUN: The first invocation builds an index (~2s for a 50k-line project).
  Subsequent runs are instant (<300ms). The index auto-updates when files change.

  LANGUAGE SERVERS (optional, for type-resolved usages):
  - Python: jedi (installed by default)
  - Go: gopls (go install golang.org/x/tools/gopls@latest)
  - TypeScript: typescript-language-server (npm install -g typescript-language-server typescript)
  Without language servers, usages returns index-based results (name matching).

workflow: |
  RECOMMENDED WORKFLOW:

  1. Map: Run 'files --summary' to get a project map (files + top-level symbols)
  2. Explore: Run 'outline <file>' to see a file's full skeleton
  3. Find: Run 'locate <name>' to find where something is defined
  4. Read: Run 'body <name>' to read just the symbol you need
  5. Trace: Run 'usages <name>' to find all callers/references (type-resolved)
  6. Deps: Run 'imports <file>' to see what a file depends on

  QUICK PATTERNS:

  "I'm new to this project, what's here?"
    → ii-structure files --summary

  "I know the file, what's inside?"
    → ii-structure outline <file> --depth full

  "Where is X defined?"
    → ii-structure locate X

  "Who calls X.method()?"
    → ii-structure usages X/method

  "I need to read the implementation of X"
    → ii-structure body X

  "What would break if I change file Y?"
    → ii-structure imports Y  (check imported_by)

  "I'm looking for something related to authentication"
    → ii-structure search auth

  WHEN TO USE YOUR NATIVE TOOLS INSTEAD:
  - Glob: when you know the filename pattern you're looking for
  - Grep: when searching for string literals, comments, TODOs, regex patterns
  - Read: when you need the full file or a specific line range
  ii-structure searches structure, not text. Use each tool for what it's best at.

commands:
  files:
    description: "List indexed files, or get a project map with --summary."
    when_to_use: |
      YOUR FIRST COMMAND on any new project. Use 'files --summary' to get a project map
      showing every file with its top-level classes and functions. This is like reading
      outlines of every file at once, but 8x cheaper in tokens.
      Use plain 'files' (no --summary) only when you need just the file list.
    when_not_to_use: |
      When you know the filename pattern — use your native Glob tool instead.
      When you need a specific file's full skeleton — use 'outline' instead.
    cost: fast
    usage: "ii-structure files [--glob PATTERN] [--path PREFIX] [--summary]"
    tips: |
      --summary: returns files + top-level symbol signatures. This is the project map.
        Use this first on any unfamiliar project. One command, full orientation.
      --glob: shell patterns like '*model*', 'test_*.py'
      --path: prefix filter like 'src/api/'
      Combine: 'files --summary --path src/' maps only source files, skipping tests.
    example:
      input: "ii-structure files --summary --path src/"
      output: |
        ok: true
        command: files
        result:
          - file: src/models/user.py
            symbols:
              - "class User(BaseModel)"
              - "class UserCreate(BaseModel)"
          - file: src/api/routes.py
            symbols:
              - "def create_user(request: Request) -> User"
              - "def get_user(user_id: int) -> User"

  outline:
    description: "File skeleton: classes, functions, signatures, docstrings. No function bodies."
    when_to_use: |
      Your FIRST move when exploring a file. Returns the complete structure in ~100 tokens
      instead of ~2000 tokens for reading the whole file. Shows you what's there so you can
      decide what to read in detail with 'body'.
    when_not_to_use: "When you need the actual implementation code. Use 'body <symbol>' for that."
    cost: fast
    usage: "ii-structure outline <file> [--depth top|full] [--kind class|function|method|variable]"
    tips: |
      --depth top (default): top-level symbols only — classes, module functions, constants
      --depth full: includes methods inside classes, nested functions
      --kind class: show only classes (useful for large files)
      The output includes imports, so you can see dependencies too.
    example:
      input: "ii-structure outline src/models/user.py --depth full"
      output: |
        ok: true
        command: outline
        result:
          file: src/models/user.py
          symbols:
            - name: User
              kind: class
              line: 10
              signature: "class User(BaseModel)"
              docstring: "Core user entity"
              children: [__init__, save, delete, to_dict]
            - name: save
              kind: method
              line: 25
              signature: "def save(self) -> bool"
              docstring: "Persist to database"
          imports:
            - module: sqlalchemy
              names: [Column, String]

  locate:
    description: "Find where a symbol is defined. Returns file, line, kind, signature."
    when_to_use: |
      When you know the name but not the file. Faster than grepping because it searches
      the structural index, not file contents. Supports hierarchical name paths.
    when_not_to_use: "When you need usage sites (where it's called). Use 'usages' instead."
    cost: fast
    usage: "ii-structure locate <name> [--kind class|function|method|variable] [--file FILE] [--match exact|substring]"
    tips: |
      Name paths: 'User/save' finds method save inside class User
      Anchored: '/User' finds only top-level User (not nested)
      Substring: --match substring finds partial matches ('auth' matches 'authenticate')
      Kind filter: --kind method finds only methods, not classes or functions
      Multiple results: if 'save' exists in User and Product, both are returned
    example:
      input: "ii-structure locate User/save"
      output: |
        ok: true
        command: locate
        result:
          - file: src/models/user.py
            line: 25
            kind: method
            name: save
            signature: "def save(self) -> bool"
            docstring: "Persist to database"
            parent: User

  usages:
    description: "Find all references to a symbol, resolved by type. Uses Jedi (Python), gopls (Go), or tsserver (TypeScript)."
    when_to_use: |
      When you need to know everywhere a symbol is used — callers, imports, assignments.
      This is TYPE-RESOLVED: 'usages User/save' finds only calls to User.save(),
      not Product.save() or dict.save(). This is the key advantage over grep.
      Works across Python, Go, and TypeScript. If language server is not installed,
      falls back to index-based name matching (still useful, just not type-resolved).
    when_not_to_use: |
      For simple text search — use grep.
      For finding definitions — use locate (faster, no Jedi overhead).
    cost: moderate
    usage: "ii-structure usages <name> [--path SCOPE] [--kind call|import|reference|definition] [--limit N] [--no-tests]"
    tips: |
      First run on a project may take 2-5s (Jedi builds its cache). Subsequent runs: <1s.
      --path restricts to a directory: --path src/api/ searches only that subtree
      --limit defaults to 50. If you hit the limit, narrow with --path or --kind.
      Each result includes one line of context so you can scan without reading files.
      --no-tests excludes test files (test_*, *_test.py, conftest.py, tests/ dirs).
      Use --no-tests when exploring an API. OMIT it when refactoring — you need all call sites.
    example:
      input: "ii-structure usages User/save --limit 10"
      output: |
        ok: true
        command: usages
        result:
          - file: src/services/user_service.py
            line: 23
            kind: reference
            context: "user.save()"
          - file: src/api/routes.py
            line: 45
            kind: reference
            context: "new_user.save()"
          - file: src/models/user.py
            line: 25
            kind: definition
            context: "def save(self) -> bool:"

  body:
    description: "Get the full source code of one symbol."
    when_to_use: |
      After 'outline' showed you a symbol exists and you need to read its implementation.
      Returns just that symbol's code — not the whole file. Saves significant tokens on
      large files where you only need one function.
    when_not_to_use: "When you need the whole file. Use your Read tool for that."
    cost: fast
    usage: "ii-structure body <name> [--file FILE]"
    tips: |
      Name paths work: 'body User/save' gets just the save method
      --file disambiguates: if 'save' exists in multiple classes, --file models.py picks one
      For a class, returns the ENTIRE class including all methods.
    example:
      input: "ii-structure body User/save"
      output: |
        ok: true
        command: body
        result:
          file: src/models/user.py
          line: 25
          name: save
          kind: method
          source: |
            def save(self) -> bool:
                """Persist to database."""
                self.updated_at = datetime.now()
                db.session.add(self)
                db.session.commit()
                return True

  imports:
    description: "What a file imports and what imports it."
    when_to_use: |
      Before modifying a file — check imported_by to understand blast radius.
      When understanding architecture — see how modules connect.
    when_not_to_use: "For finding symbol definitions. Use 'locate' instead."
    cost: fast
    usage: "ii-structure imports <file> [--depth N] [--include-external]"
    tips: |
      --depth 1 (default): direct imports only
      --depth 2: imports of imports — shows the neighborhood
      Third-party packages excluded by default. --include-external adds them.
      imported_by is the reverse: files that depend on THIS file.
    example:
      input: "ii-structure imports src/services/user_service.py"
      output: |
        ok: true
        command: imports
        result:
          file: src/services/user_service.py
          imports:
            - module: models.user
              file: src/models/user.py
              names: [User]
          imported_by:
            - file: src/api/routes.py
              module: services.user_service
              names: [create_user, delete_user]

  replace-body:
    description: "Replace the full source of a symbol with new code from stdin."
    when_to_use: |
      When you need to rewrite a function, method, or class. Pipe the new source via stdin.
      This is the structural alternative to Edit with old_str/new_str — you don't need to
      compute the exact old text. Just name the symbol and provide the replacement.
    when_not_to_use: |
      For inserting new code (use insert-symbol). For non-symbol edits like changing
      a string literal or comment (use your native Edit tool).
    cost: fast
    usage: "echo 'new code' | ii-structure replace-body <name> [--file FILE]"
    tips: |
      Name paths work: 'replace-body User/save' targets just the save method
      --file disambiguates when the same name exists in multiple files
      The new body's indentation is automatically adjusted to match the existing symbol
      The index auto-refreshes after the write — no rebuild needed
    example:
      input: "echo 'def save(self):\\n    self.db.update(self.to_dict())\\n    return True' | ii-structure replace-body User/save"
      output: |
        ok: true
        command: replace-body
        result:
          file: src/models/user.py
          symbol: User/save
          lines_removed: 4
          lines_added: 3
          new_range: [25, 27]

  insert-symbol:
    description: "Insert new code before or after an existing symbol."
    when_to_use: |
      When you need to add a new function, method, or class next to an existing symbol.
      Pipe the new code via stdin and specify --after or --before to position it.
      Handles indentation and blank line separators automatically.
    when_not_to_use: |
      For replacing existing code (use replace-body). For adding code at arbitrary
      line positions (use your native Edit tool).
    cost: fast
    usage: "echo 'new code' | ii-structure insert-symbol --after <name> [--file FILE]"
    tips: |
      --after User/save inserts the new code right after the save method
      --before main inserts before the main function
      Indentation matches the anchor symbol's level automatically
      A blank line separator is added between the anchor and new code
    example:
      input: "echo 'def validate(self):\\n    if not self.name:\\n        raise ValueError(\"name required\")' | ii-structure insert-symbol --after User/save"
      output: |
        ok: true
        command: insert-symbol
        result:
          file: src/models/user.py
          anchor: User/save
          position: after
          lines_added: 3
          inserted_range: [29, 31]

  search:
    description: "Ranked search over symbol names and docstrings."
    when_to_use: |
      When you don't know the exact name. 'search auth' finds authenticate_user,
      AuthService, login, etc. Searches structural metadata, not file contents —
      so it's precise and won't match string literals or comments.
    when_not_to_use: "For text search in code bodies or comments. Use grep."
    cost: fast
    usage: "ii-structure search <query> [--limit N]"
    tips: |
      Ranking: exact name > prefix > substring > docstring match
      Case-insensitive. 'search user' matches User, get_user, UserService.
      Default limit is 20. Increase with --limit for broad searches.
    example:
      input: "ii-structure search authenticate"
      output: |
        ok: true
        command: search
        result:
          - file: src/auth/service.py
            name: authenticate_user
            kind: function
            line: 15
            signature: "def authenticate_user(token: str) -> User"
          - file: src/auth/middleware.py
            name: AuthenticationMiddleware
            kind: class
            line: 8
